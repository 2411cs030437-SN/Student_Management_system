<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied | College ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-page">
<main class="auth-shell single">
    <section class="auth-panel text-center">
        <span class="danger-icon"><i class="bi bi-shield-lock"></i></span>
        <h1>Access Denied</h1>
        <p class="text-muted" th:text="${message}">You do not have access to that page.</p>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-primary" type="submit">Back to Login</button>
        </form>
    </section>
</main>
</body>
</html>
